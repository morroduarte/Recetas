<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras · IHH Oriental</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Compras IHH">
<meta name="theme-color" content="#b5482f">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAF7F2;
    --card: #FFFFFF;
    --border: rgba(26,22,18,0.1);
    --ink: #1A1612;
    --ink2: #6B6258;
    --ink3: #9A9086;
    --red: #B5482F; --red-bg: #FAECE7;
    --teal: #0F6E56; --teal-bg: #E1F5EE;
    --amber: #854F0B; --amber-bg: #FAEEDA;
    --purple: #3C3489; --purple-bg: #EEEDFE;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); min-height: 100vh; }
  .wrap { max-width: 600px; margin: 0 auto; padding: 16px 14px 80px; }

  header { margin-bottom: 1.25rem; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  h1 { font-size: 20px; font-weight: 600; }
  .subtitle { font-size: 12px; color: var(--ink2); line-height: 1.5; }
  .recetas-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .receta-tag { font-size: 11px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; color: var(--ink2); }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 8px; }
  .progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--red); border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: var(--ink2); white-space: nowrap; }
  .btn { font-family: var(--font); font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--ink); cursor: pointer; white-space: nowrap; }
  .btn:active { background: var(--bg); }

  .section { margin-bottom: 1.25rem; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 0 2px; }
  .section-title { font-size: 13px; font-weight: 600; }
  .section-count { font-size: 11px; color: var(--ink3); }

  .item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius);
    background: var(--card); border: 1px solid var(--border);
    margin-bottom: 4px; cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .item.done { background: var(--bg); opacity: 0.55; }
  .item.done .item-name { text-decoration: line-through; }

  .checkbox {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.15s;
  }
  .checkbox.checked { border-color: var(--red); background: var(--red); }
  .checkbox.checked::after { content: "✓"; font-size: 11px; color: white; font-weight: 600; }

  .item-body { flex: 1; min-width: 0; }
  .item-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .item-name { font-size: 14px; font-weight: 500; }
  .item-qty { font-size: 13px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .item-meta { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
  .recipe-pill { font-size: 10px; padding: 1px 7px; border-radius: 10px; }
  .item-obs { font-size: 11px; color: var(--ink3); }

  .red .section-title, .red .item-qty { color: var(--red); }
  .red .recipe-pill { background: var(--red-bg); color: var(--red); }
  .teal .section-title, .teal .item-qty { color: var(--teal); }
  .teal .recipe-pill { background: var(--teal-bg); color: var(--teal); }
  .amber .section-title, .amber .item-qty { color: var(--amber); }
  .amber .recipe-pill { background: var(--amber-bg); color: var(--amber); }
  .purple .section-title, .purple .item-qty { color: var(--purple); }
  .purple .recipe-pill { background: var(--purple-bg); color: var(--purple); }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
    max-width: 600px; margin: 0 auto;
  }
  /* Fix: center the bottom bar */
  @media (min-width: 600px) {
    .bottom-bar { left: 50%; transform: translateX(-50%); width: 600px; }
  }
  .bottom-text { font-size: 12px; color: var(--ink2); }
  .bottom-actions { display: flex; gap: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <div>
        <h1>Lista de Compras</h1>
        <p class="subtitle">Instituto Hermann Hesse · Cocina Oriental</p>
      </div>
      <span style="font-size:24px;">🛒</span>
    </div>
    <div class="recetas-tags">
      <span class="receta-tag">Camarón con Fideo Crujiente</span>
      <span class="receta-tag">Char Siu</span>
      <span class="receta-tag">Cerdo de Cinco Sabores</span>
      <span class="receta-tag">Pato Pekín</span>
      <span class="receta-tag">Pollo a la Naranja</span>
    </div>
  </header>

  <div class="toolbar">
    <div class="progress-bar-wrap"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
    <span class="progress-text" id="ptext">0 / 33</span>
    <button class="btn" onclick="toggleAll()" id="toggle-btn">✓ Marcar todo</button>
  </div>

  <div id="lista"></div>
</div>

<div class="bottom-bar">
  <span class="bottom-text" id="bottom-text">33 ingredientes pendientes</span>
  <div class="bottom-actions">
    <button class="btn" onclick="resetAll()">↺ Reiniciar</button>
  </div>
</div>

<script>
const secciones = [
  {
    cat: "🥩 Proteínas y Mariscos", color: "red",
    items: [
      { nombre:"Camarones U-10", qty:"400 g", recetas:["Camarón con Fideo"], obs:"Pelados, desvenados" },
      { nombre:"Carne de cerdo maciza", qty:"500 g", recetas:["Cerdo de Cinco Sabores"], obs:"Con algo de grasa" },
      { nombre:"Lomo de cerdo", qty:"1.5 kg", recetas:["Char Siu"], obs:"Entero" },
      { nombre:"Pato entero", qty:"1 pza (~2 kg)", recetas:["Pato Pekín"], obs:"Pedir con anticipación" },
      { nombre:"Pechuga de pollo", qty:"1 pza", recetas:["Pollo a la Naranja"], obs:"Cubos de 3 cm" },
    ]
  },
  {
    cat: "🥬 Frutas y Verduras", color: "teal",
    items: [
      { nombre:"Ajo", qty:"4 dientes + 15 g", recetas:["Char Siu","Cerdo de Cinco Sabores"], obs:"Triturado y picado" },
      { nombre:"Cebolla de cambray", qty:"1 pza + 6 pzas", recetas:["Cerdo de Cinco Sabores","Pato Pekín"], obs:"Picada y en tiras" },
      { nombre:"Naranja", qty:"4-5 pzas", recetas:["Pollo a la Naranja"], obs:"Para jugo y ralladura" },
      { nombre:"Pepino", qty:"1 pza", recetas:["Pato Pekín"], obs:"Tiras finas" },
    ]
  },
  {
    cat: "🏮 Abarrotes Orientales", color: "amber",
    items: [
      { nombre:"Aceite con chile frito", qty:"30 ml", recetas:["Cerdo de Cinco Sabores"], obs:"Chiu Chow o similar" },
      { nombre:"Aceite de ajonjolí", qty:"5 ml", recetas:["Camarón con Fideo"], obs:"Sazonador" },
      { nombre:"Colorante rojo comestible", qty:"al gusto", recetas:["Char Siu"], obs:"Opcional" },
      { nombre:"Crema de cacahuate", qty:"30 g", recetas:["Cerdo de Cinco Sabores"], obs:"Natural, sin azúcar" },
      { nombre:"Fideo chino delgado", qty:"50 g", recetas:["Camarón con Fideo"], obs:"Tienda asiática" },
      { nombre:"Glucosa / miel de maíz", qty:"30 g", recetas:["Pato Pekín"], obs:"Para barniz de la piel" },
      { nombre:"Polvo 5 especias", qty:"8 g total", recetas:["Char Siu","Pato Pekín"], obs:"5 g + 3 g" },
      { nombre:"Salsa de soya oscura", qty:"105 ml total", recetas:["Char Siu","Cerdo de Cinco Sabores"], obs:"60 ml + 45 ml" },
      { nombre:"Salsa hoisin", qty:"285 ml total", recetas:["Char Siu","Pato Pekín","Pollo a la Naranja"], obs:"Frasco grande — 60+100+125 ml" },
      { nombre:"Vinagre blanco", qty:"15 ml", recetas:["Cerdo de Cinco Sabores"], obs:"De arroz ideal" },
      { nombre:"Vino de arroz / sake", qty:"60 ml", recetas:["Char Siu"], obs:"O sake como sustituto" },
    ]
  },
  {
    cat: "🛒 Abarrotes Generales", color: "purple",
    items: [
      { nombre:"Aceite vegetal", qty:"500 ml", recetas:["Camarón con Fideo"], obs:"Fritura profunda" },
      { nombre:"Azúcar blanca", qty:"113 g total", recetas:["Cerdo de Cinco Sabores","Pato Pekín","Pollo a la Naranja"], obs:"3 + 50 + 60 g" },
      { nombre:"Azúcar morena", qty:"15 g", recetas:["Char Siu"], obs:"1 cucharada" },
      { nombre:"Catsup", qty:"60 ml", recetas:["Char Siu"], obs:"4 cucharadas" },
      { nombre:"Fécula de maíz", qty:"70 g total", recetas:["Pollo a la Naranja"], obs:"60 g empanizado + 10 g salsa" },
      { nombre:"Harina de trigo", qty:"130 g total", recetas:["Camarón con Fideo","Pollo a la Naranja"], obs:"100 + 30 g" },
      { nombre:"Huevo", qty:"3 pzas", recetas:["Camarón con Fideo","Pollo a la Naranja"], obs:"2 + 1 pza" },
      { nombre:"Miel de abeja", qty:"60 ml", recetas:["Char Siu"], obs:"4 cucharadas" },
      { nombre:"Pimienta cayena", qty:"1 pizca", recetas:["Pollo a la Naranja"], obs:"Picor sutil" },
      { nombre:"Ron", qty:"5 ml", recetas:["Pato Pekín"], obs:"Para interior del pato" },
      { nombre:"Sal", qty:"al gusto", recetas:["Cerdo de Cinco Sabores","Pato Pekín"], obs:"" },
      { nombre:"Tortillas de harina pequeñas", qty:"16 pzas", recetas:["Pato Pekín"], obs:"Tipo mandarin pancake" },
      { nombre:"Vino blanco", qty:"125 ml", recetas:["Cerdo de Cinco Sabores"], obs:"Para cocción del cerdo" },
    ]
  }
];

let checked = {};
let allChecked = false;
const total = secciones.reduce((a,s) => a + s.items.length, 0);

function getId(cat, idx) { return `${cat}-${idx}`; }

function render() {
  const done = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((done/total)*100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ptext').textContent = `${done} / ${total}`;
  const pending = total - done;
  document.getElementById('bottom-text').textContent =
    pending === 0 ? '¡Lista completa! 🎉' : `${pending} ingrediente${pending!==1?'s':''} pendiente${pending!==1?'s':''}`;

  document.getElementById('lista').innerHTML = secciones.map(sec => `
    <div class="section ${sec.color}">
      <div class="section-header">
        <span class="section-title">${sec.cat}</span>
        <span class="section-count">${sec.items.length} ingredientes</span>
      </div>
      ${sec.items.map((item, idx) => {
        const id = getId(sec.cat, idx);
        const done = !!checked[id];
        return `
          <div class="item ${done?'done':''}" onclick="toggle('${id}')">
            <div class="checkbox ${done?'checked':''}"></div>
            <div class="item-body">
              <div class="item-top">
                <span class="item-name">${item.nombre}</span>
                <span class="item-qty">${item.qty}</span>
              </div>
              <div class="item-meta">
                ${item.recetas.map(r=>`<span class="recipe-pill">${r}</span>`).join('')}
                ${item.obs?`<span class="item-obs">${item.obs}</span>`:''}
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>
  `).join('');
}

function toggle(id) { checked[id] = !checked[id]; render(); }

function toggleAll() {
  allChecked = !allChecked;
  secciones.forEach(sec => sec.items.forEach((_,i) => { checked[getId(sec.cat,i)] = allChecked; }));
  document.getElementById('toggle-btn').textContent = allChecked ? '☐ Desmarcar todo' : '✓ Marcar todo';
  render();
}

function resetAll() {
  checked = {};
  allChecked = false;
  document.getElementById('toggle-btn').textContent = '✓ Marcar todo';
  render();
}

render();
</script>
</body>
</html>
